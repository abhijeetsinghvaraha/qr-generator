<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Sheet Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    --soil: #3d2b1f;
    --leaf: #2d6a4f;
    --sand: #f4e3c1;
    --cream: #fdf8f0;
    --ink: #1a1a1a;
    --accent: #e76f51;
    --muted: #8a7968;
    --border: #d4c5a9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  .ui {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
    background: var(--cream);
  }

  .hero { text-align: center; margin-bottom: 40px; }

  .hero-badge {
    display: inline-block;
    background: var(--leaf);
    color: white;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  .hero h1 {
    font-size: clamp(30px, 5vw, 52px);
    font-weight: 800;
    color: var(--soil);
    line-height: 1.1;
    margin-bottom: 10px;
  }

  .hero h1 span { color: var(--leaf); }
  .hero p { font-size: 15px; color: var(--muted); max-width: 400px; line-height: 1.6; }

  .controls-card {
    background: white;
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 8px 40px rgba(61,43,31,0.08);
    margin-bottom: 28px;
  }

  .field-group { margin-bottom: 22px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
  }

  input[type="number"], input[type="text"] {
    width: 100%;
    padding: 13px 15px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    color: var(--ink);
    background: var(--cream);
    transition: border-color 0.2s;
    outline: none;
  }

  input:focus { border-color: var(--leaf); }

  .row { display: flex; gap: 14px; }
  .row .field-group { flex: 1; }

  .toggle-group { display: flex; gap: 8px; flex-wrap: wrap; }

  .toggle-btn {
    padding: 9px 16px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: white;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }

  .toggle-btn.active { border-color: var(--leaf); background: var(--leaf); color: white; }

  .preview-code {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    background: var(--sand);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 13px;
    color: var(--leaf);
    margin-top: 9px;
    letter-spacing: 1px;
  }

  .hint { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 5px; }

  .btn-generate {
    width: 100%;
    padding: 17px;
    background: var(--leaf);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
  }

  .btn-generate:hover { background: #1b5e42; transform: translateY(-1px); }

  .actions-bar {
    display: none;
    gap: 12px;
    width: 100%;
    max-width: 500px;
    margin-bottom: 36px;
  }

  .btn-action {
    flex: 1;
    padding: 13px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: white;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }

  .btn-action:hover { border-color: var(--leaf); color: var(--leaf); }
  .btn-action.accent { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-action.accent:hover { background: #cf5e3a; border-color: #cf5e3a; }

  .sheet-counter {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    text-align: center;
  }

  .sheets-wrapper {
    width: 100%;
    max-width: 860px;
    display: flex;
    flex-direction: column;
    gap: 48px;
    align-items: center;
  }

  .sheet-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
    align-self: flex-start;
  }

  /* ══════════════════════════════
     A4 SHEET — 5×10, matches PDF
     ══════════════════════════════ */
  .a4-sheet {
    width: 794px;
    min-height: 1122px;
    background: white;
    border: 1px solid #bbb;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 28px 22px 22px;
    display: flex;
    flex-direction: column;
  }

  .qr-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    border-top: 1px solid #000;
    border-left: 1px solid #000;
    flex: 1;
  }

  .qr-cell {
    border-right: 1px solid #000;
    border-bottom: 1px solid #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 6px 10px;
    gap: 7px;
  }

  .qr-cell > div canvas,
  .qr-cell > div img {
    width: 120px !important;
    height: 120px !important;
    display: block;
  }

  .qr-id {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: #000;
    letter-spacing: 0.5px;
    text-align: center;
    font-weight: 400;
  }

  /* ── PRINT ── */
  @media print {
    body { background: white; }

    .ui { padding: 0; }
    .hero, .controls-card, .actions-bar, .sheet-counter, .sheet-label { display: none !important; }
    .sheets-wrapper { gap: 0; max-width: 100%; }

    .a4-sheet {
      width: 210mm;
      min-height: 297mm;
      border: none;
      box-shadow: none;
      padding: 9mm 8mm;
      page-break-after: always;
    }

    .qr-cell > div canvas,
    .qr-cell > div img {
      width: 112px !important;
      height: 112px !important;
    }

    .qr-id { font-size: 9px; }
  }
</style>
</head>
<body>

<div class="ui">
  <div class="hero">
    <div class="hero-badge">🌱 Field Sampling Tool</div>
    <h1>QR Sheet<br><span>Generator</span></h1>
    <p>A4 sheets with 50 QR codes (5 × 10 grid) — print-ready for soil sample bags.</p>
  </div>

  <div class="controls-card">
    <div class="row">
      <div class="field-group">
        <label>Number of Sheets</label>
        <input type="number" id="sheetCount" value="1" min="1" max="20">
      </div>
      <div class="field-group">
        <label>ID Length</label>
        <input type="number" id="idLength" value="8" min="4" max="16">
      </div>
    </div>

    <div class="field-group">
      <label>Prefix (optional)</label>
      <input type="text" id="prefix" placeholder="e.g. ERW- or KHR-" maxlength="8">
      <div class="hint">Leave blank for plain IDs like A5B2E7E5</div>
      <div class="preview-code" id="previewCode">Preview: A5B2E7E5</div>
    </div>

    <div class="field-group">
      <label>Character Set</label>
      <div class="toggle-group">
        <button class="toggle-btn active" data-set="upper">A–Z Upper</button>
        <button class="toggle-btn active" data-set="digits">0–9 Digits</button>
        <button class="toggle-btn" data-set="lower">a–z Lower</button>
      </div>
    </div>

    <button class="btn-generate" onclick="generateSheets()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3m0 4h4m-4-4v4m0-4h4"/>
      </svg>
      Generate QR Sheets
    </button>
  </div>

  <div class="actions-bar" id="actionsBar">
    <button class="btn-action" onclick="downloadCSV()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Export CSV
    </button>
    <button class="btn-action accent" onclick="window.print()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 6 2 18 2 18 9"/>
        <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
        <rect x="6" y="14" width="12" height="8"/>
      </svg>
      Print / Save PDF
    </button>
  </div>

  <div class="sheet-counter" id="sheetCounter"></div>
  <div class="sheets-wrapper" id="sheetsWrapper"></div>
</div>

<script>
  let activeSets = ['upper', 'digits'];
  let generatedIds = [];

  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const set = btn.dataset.set;
      if (activeSets.includes(set)) {
        if (activeSets.length === 1) return;
        activeSets = activeSets.filter(s => s !== set);
        btn.classList.remove('active');
      } else {
        activeSets.push(set);
        btn.classList.add('active');
      }
      updatePreview();
    });
  });

  document.getElementById('idLength').addEventListener('input', updatePreview);
  document.getElementById('prefix').addEventListener('input', updatePreview);

  function getCharset() {
    let c = '';
    if (activeSets.includes('upper'))  c += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    if (activeSets.includes('lower'))  c += 'abcdefghijklmnopqrstuvwxyz';
    if (activeSets.includes('digits')) c += '0123456789';
    return c || 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  }

  function randomId(length) {
    const chars = getCharset();
    const arr = new Uint8Array(length);
    crypto.getRandomValues(arr);
    return Array.from(arr).map(v => chars[v % chars.length]).join('');
  }

  function updatePreview() {
    const len = parseInt(document.getElementById('idLength').value) || 8;
    const prefix = document.getElementById('prefix').value.trim();
    document.getElementById('previewCode').textContent = 'Preview: ' + prefix + randomId(len);
  }

  updatePreview();

  const PER_SHEET = 50;

  function generateSheets() {
    const sheetCount = Math.min(parseInt(document.getElementById('sheetCount').value) || 1, 20);
    const idLen = Math.min(Math.max(parseInt(document.getElementById('idLength').value) || 8, 4), 16);
    const prefix = document.getElementById('prefix').value.trim();

    generatedIds = [];
    const wrapper = document.getElementById('sheetsWrapper');
    wrapper.innerHTML = '';

    document.getElementById('sheetCounter').textContent =
      `Generating ${sheetCount * PER_SHEET} QR codes across ${sheetCount} sheet${sheetCount > 1 ? 's' : ''}...`;

    const used = new Set();
    for (let i = 0; i < sheetCount * PER_SHEET; i++) {
      let id;
      do { id = prefix + randomId(idLen); } while (used.has(id));
      used.add(id);
      generatedIds.push(id);
    }

    for (let s = 0; s < sheetCount; s++) {
      const ids = generatedIds.slice(s * PER_SHEET, (s + 1) * PER_SHEET);

      const labelDiv = document.createElement('div');
      labelDiv.className = 'sheet-label';
      labelDiv.textContent = `Sheet ${s + 1} of ${sheetCount}`;
      wrapper.appendChild(labelDiv);

      const sheet = document.createElement('div');
      sheet.className = 'a4-sheet';

      const grid = document.createElement('div');
      grid.className = 'qr-grid';

      ids.forEach((id, i) => {
        const cell = document.createElement('div');
        cell.className = 'qr-cell';

        const qrDiv = document.createElement('div');
        qrDiv.id = `qr-${s}-${i}`;

        const label = document.createElement('div');
        label.className = 'qr-id';
        label.textContent = id;

        cell.appendChild(qrDiv);
        cell.appendChild(label);
        grid.appendChild(cell);
      });

      sheet.appendChild(grid);
      wrapper.appendChild(sheet);

      ids.forEach((id, i) => {
        setTimeout(() => {
          new QRCode(document.getElementById(`qr-${s}-${i}`), {
            text: id,
            width: 120,
            height: 120,
            colorDark: '#000000',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.M
          });
        }, 0);
      });
    }

    document.getElementById('sheetCounter').textContent =
      `✅ ${sheetCount * PER_SHEET} QR codes ready — ${sheetCount} sheet${sheetCount > 1 ? 's' : ''} generated`;
    document.getElementById('actionsBar').style.display = 'flex';
  }

  function downloadCSV() {
    if (!generatedIds.length) return;
    const header = 'id,sheet,position\n';
    const rows = generatedIds.map((id, i) =>
      `${id},${Math.floor(i / PER_SHEET) + 1},${(i % PER_SHEET) + 1}`
    ).join('\n');
    const blob = new Blob([header + rows], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `qr-ids-${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
  }
</script>
</body>
</html>
